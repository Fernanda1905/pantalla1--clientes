<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clientes · Sistema Sakila</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1E3A8A; --indigo:#3B82F6; --teal:#0D9488; --amber:#F59E0B;
    --ok:#10B981; --err:#EF4444;
    --bg:#F8FAFC; --card:#FFFFFF; --ink:#0F172A; --muted:#64748B;
    --line:#E2E8F0; --input-bd:#CBD5E1; --sidebar:#1E3A8A; --zebra:#FBFCFE; --hover:#F1F5FF;
  }
  [data-theme="dark"]{
    --bg:#0F172A; --card:#1E293B; --ink:#E2E8F0; --muted:#94A3B8;
    --line:#334155; --input-bd:#475569; --sidebar:#0B1220; --zebra:#1A2436; --hover:#243049;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,Arial,sans-serif; background:var(--bg); color:var(--ink); display:flex; min-height:100vh; transition:background .2s,color .2s}
  .mono{font-family:'JetBrains Mono',monospace; font-variant-numeric:tabular-nums}

  /* SIDEBAR */
  aside{
    width:240px; background:var(--sidebar); color:#E0E7FF; flex-shrink:0;
    display:flex; flex-direction:column; padding:22px 0; position:sticky; top:0; height:100vh;
  }
  .brand{padding:0 22px 20px; border-bottom:1px solid rgba(255,255,255,.1)}
  .brand h1{font-size:17px; font-weight:700; color:#fff}
  .brand span{font-size:12px; color:#A5B4FC}
  nav{padding:16px 12px; display:flex; flex-direction:column; gap:4px; flex:1}
  nav a{
    display:flex; align-items:center; gap:11px; padding:10px 14px; border-radius:9px;
    color:#C7D2FE; text-decoration:none; font-size:14px; font-weight:500; transition:background .15s;
  }
  nav a svg{width:20px;height:20px;stroke-width:1.8;flex-shrink:0}
  nav a.active{background:var(--indigo); color:#fff}
  nav a.disabled{opacity:.5; cursor:not-allowed}
  nav a:not(.active):not(.disabled):hover{background:rgba(255,255,255,.08)}
  .sidebar-foot{padding:14px 22px 0; border-top:1px solid rgba(255,255,255,.1)}
  .theme-btn{
    width:100%; display:flex; align-items:center; gap:9px; justify-content:center;
    background:rgba(255,255,255,.1); color:#E0E7FF; border:none; padding:9px; border-radius:9px;
    cursor:pointer; font-size:13px; font-weight:500; font-family:inherit;
  }
  .theme-btn:hover{background:rgba(255,255,255,.18)}
  .theme-btn svg{width:18px;height:18px;stroke-width:1.8}

  /* MAIN */
  main{flex:1; padding:26px 32px 60px; max-width:1200px; overflow-x:hidden}
  .top{display:flex; align-items:baseline; gap:12px; margin-bottom:22px; flex-wrap:wrap}
  .top h2{font-size:1.6rem; font-weight:700; color:var(--ink)}
  .top .crumb{font-size:13px; color:var(--muted)}
  .top .estado{margin-left:auto; font-size:12px; padding:5px 12px; border-radius:999px; font-weight:600}
  .estado.on{background:#D1FAE5; color:#065F46}
  .estado.off{background:#FEE2E2; color:#991B1B}

  .card{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:20px; margin-bottom:22px; box-shadow:0 1px 3px rgba(15,23,42,.05)}
  .card h3{font-size:14px; font-weight:600; color:var(--ink); margin-bottom:14px; display:flex; align-items:center; gap:8px}
  .tag{font-size:10px; font-weight:700; padding:2px 8px; border-radius:6px; letter-spacing:.4px}
  .tag.get{background:#DBEAFE; color:#1E40AF}
  .tag.post{background:#D1FAE5; color:#065F46}

  .filtros{display:flex; gap:12px; flex-wrap:wrap; align-items:end}
  .campo{display:flex; flex-direction:column; gap:5px}
  .campo label{font-size:12px; color:var(--muted); font-weight:600}
  input,select{font:inherit; padding:9px 12px; border:1px solid var(--input-bd); border-radius:9px; background:var(--card); color:var(--ink); min-width:150px}
  input:focus,select:focus{outline:none; border-color:var(--indigo); box-shadow:0 0 0 3px rgba(59,130,246,.25)}
  button{font:inherit; font-weight:600; cursor:pointer; border:none; border-radius:9px; padding:10px 18px; transition:filter .15s,opacity .15s; display:inline-flex; align-items:center; gap:8px}
  button:hover:not(:disabled){filter:brightness(1.08)}
  button:disabled{opacity:.5; cursor:not-allowed}
  button:focus-visible{outline:none; box-shadow:0 0 0 3px rgba(59,130,246,.4)}
  .btn-primary{background:var(--navy); color:#fff}
  .btn-teal{background:var(--teal); color:#fff}
  .btn-ghost{background:transparent; color:var(--indigo); border:1px solid var(--input-bd)}

  .meta{font-size:13px; color:var(--muted); margin:14px 2px 12px}
  .meta b{color:var(--ink)}
  table{width:100%; border-collapse:collapse; font-size:14px}
  thead th{text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); padding:10px 12px; border-bottom:2px solid var(--line)}
  tbody td{padding:11px 12px; border-bottom:1px solid var(--line)}
  tbody tr{cursor:pointer; transition:background .12s}
  tbody tr:nth-child(even){background:var(--zebra)}
  tbody tr:hover{background:var(--hover)}
  .estado-cli{font-size:12px; font-weight:700; padding:3px 10px; border-radius:999px}
  .estado-cli.activo{background:#D1FAE5; color:#065F46}
  .estado-cli.inactivo{background:#FEE2E2; color:#991B1B}

  .paginacion{display:flex; gap:10px; align-items:center; margin-top:16px}
  .paginacion span{font-size:13px; color:var(--muted)}


  /* SKELETON */
  .sk{height:14px; border-radius:6px; background:linear-gradient(90deg,var(--line) 25%,var(--zebra) 50%,var(--line) 75%); background-size:200% 100%; animation:pulse 1.3s infinite}
  @keyframes pulse{0%{background-position:200% 0}100%{background-position:-200% 0}}

  /* Detalle modal */
  .modal-bg{position:fixed; inset:0; background:rgba(15,23,42,.5); display:none; align-items:center; justify-content:center; padding:20px; z-index:50}
  .modal-bg.show{display:flex}
  .modal{background:var(--card); border-radius:14px; padding:24px; max-width:440px; width:100%; animation:appear .2s}
  @keyframes appear{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .modal h3{font-size:17px; margin-bottom:14px; color:var(--ink)}
  .dato{display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--line); font-size:14px}
  .dato span:first-child{color:var(--muted)}

  @media (max-width:860px){ .grid{grid-template-columns:1fr 1fr} }
  @media (max-width:680px){
    aside{position:fixed; left:-240px; transition:left .2s; z-index:40}
    aside.open{left:0}
    main{padding:20px}
    .menu-btn{display:inline-flex!important}
    .grid{grid-template-columns:1fr}
    /* Tabla colapsa en tarjetas */
    table thead{display:none}
    table,tbody,tr,td{display:block; width:100%}
    tbody tr{margin-bottom:12px; border:1px solid var(--line); border-radius:10px; padding:8px}
    tbody td{border:none; padding:6px 10px; display:flex; justify-content:space-between}
    tbody td::before{content:attr(data-l); font-weight:600; color:var(--muted); font-size:12px}
  }
  .menu-btn{display:none; background:var(--navy); color:#fff; border:none; border-radius:8px; padding:8px 12px; cursor:pointer; margin-bottom:14px}
</style>
</head>
<body>

<aside id="sidebar">
  <div class="brand">
    <h1>Sakila</h1>
    <span>Sistema Distribuido</span>
  </div>
  <nav>
    <a class="active" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Clientes
    </a>
    <a class="disabled" href="#" title="Otro módulo del sistema">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
      Catálogo
    </a>
    <a class="disabled" href="#" title="Otro módulo del sistema">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      Pagos
    </a>
    <a class="disabled" href="#" title="Otro módulo del sistema">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      Punto de Venta
    </a>
  </nav>
  <div class="sidebar-foot">
    <button class="theme-btn" onclick="toggleTema()">
      <svg id="iconTema" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <span id="txtTema">Modo oscuro</span>
    </button>
  </div>
</aside>

<main>
  <button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰ Menú</button>
  <div class="top">
    <h2>Clientes</h2>
    <span class="crumb">Listado y búsqueda · Andrea</span>
    <span class="estado off" id="estadoApi">Conectando…</span>
  </div>

  <!-- BUSCAR (GET) -->
  <div class="card">
    <h3>Buscar clientes <span class="tag get">GET</span></h3>
    <div class="filtros">
      <div class="campo"><label for="fId">ID de cliente</label><input id="fId" type="number" placeholder="Ej. 42" min="1" onkeydown="if(event.key==='Enter')buscar(1)" style="min-width:110px"></div>
      <div class="campo"><label for="fNombre">Nombre o apellido</label><input id="fNombre" type="text" placeholder="Ej. Maria…" onkeydown="if(event.key==='Enter')buscar(1)"></div>
      <div class="campo"><label for="fTienda">Tienda</label><select id="fTienda"><option value="">Todas</option><option value="1">Tienda 1</option><option value="2">Tienda 2</option></select></div>
      <div class="campo"><label for="fEstado">Estado</label><select id="fEstado"><option value="">Todos</option><option value="activo">Activo</option><option value="inactivo">Inactivo</option></select></div>
      <button class="btn-primary" onclick="buscar(1)">Buscar</button>
      <button class="btn-ghost" onclick="limpiar()">Limpiar</button>
    </div>
    <div class="meta" id="meta"></div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr><th>ID</th><th>Nombre</th><th>Ciudad, País</th><th>Tienda</th><th>Estado</th></tr></thead>
        <tbody id="tabla"></tbody>
      </table>
    </div>
    <div class="paginacion">
      <button class="btn-ghost" onclick="anterior()">‹ Anterior</button>
      <span id="infoPagina">Página 1</span>
      <button class="btn-ghost" onclick="siguiente()">Siguiente ›</button>
    </div>
  </div>

</main>

<!-- Modal detalle -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)cerrarModal()">
  <div class="modal" id="modalContenido"></div>
</div>

<script>
  const API = window.location.origin;  // la misma API que sirve esta página
  let paginaActual = 1;
  const PORPAG = 10;

  // Tema claro/oscuro
  function toggleTema(){
    const html = document.documentElement;
    const oscuro = html.getAttribute("data-theme") === "dark";
    html.setAttribute("data-theme", oscuro ? "light" : "dark");
    document.getElementById("txtTema").textContent = oscuro ? "Modo oscuro" : "Modo claro";
  }

  window.addEventListener("load", () => {
    fetch(API + "/api")
      .then(r => r.json())
      .then(() => { setEstado(true); buscar(1); })
      .catch(() => setEstado(false));
  });
  function setEstado(ok){
    const e = document.getElementById("estadoApi");
    e.className = "estado " + (ok ? "on" : "off");
    e.textContent = ok ? "API conectada ✓" : "API no responde";
  }

  function skeleton(){
    let filas = "";
    for(let i=0;i<6;i++){
      filas += `<tr>${'<td><div class="sk"></div></td>'.repeat(5)}</tr>`;
    }
    document.getElementById("tabla").innerHTML = filas;
  }

  async function buscar(pagina){
    paginaActual = pagina;
    const id = document.getElementById("fId").value.trim();

    // Si hay ID, buscar directamente por ID ignorando los demás filtros
    if(id){
      skeleton();
      try{
        const r = await fetch(`${API}/clientes/${id}`);
        if(r.status === 404){
          document.getElementById("meta").innerHTML = "";
          document.getElementById("infoPagina").textContent = "Página 1";
          document.getElementById("tabla").innerHTML = `<tr><td colspan="5" style="color:var(--muted);padding:20px">No se encontró ningún cliente con ID ${id}.</td></tr>`;
          return;
        }
        const c = await r.json();
        pintar({ items:[c], total:1, pagina:1, total_paginas:1 });
      }catch(e){
        document.getElementById("tabla").innerHTML = `<tr><td colspan="5" style="color:var(--err);padding:20px">No se pudo conectar con la API.</td></tr>`;
      }
      return;
    }

    const nombre = document.getElementById("fNombre").value.trim();
    const tienda = document.getElementById("fTienda").value;
    const estado = document.getElementById("fEstado").value;
    let url = `${API}/clientes?pagina=${pagina}&por_pagina=${PORPAG}`;
    if(nombre) url += `&nombre=${encodeURIComponent(nombre)}`;
    if(tienda) url += `&tienda=${tienda}`;
    if(estado) url += `&estado=${estado}`;
    skeleton();
    try{
      const r = await fetch(url);
      pintar(await r.json());
    }catch(e){
      document.getElementById("tabla").innerHTML = `<tr><td colspan="5" style="color:var(--err);padding:20px">No se pudo conectar con la API.</td></tr>`;
    }
  }

  let ultimos = [];
  function pintar(data){
    ultimos = data.items;
    document.getElementById("meta").innerHTML = `Se encontraron <b>${data.total}</b> clientes · mostrando ${data.items.length} en esta página`;
    document.getElementById("infoPagina").textContent = `Página ${data.pagina} de ${data.total_paginas || 1}`;
    const t = document.getElementById("tabla");
    if(!data.items.length){ t.innerHTML = `<tr><td colspan="5" style="color:var(--muted);padding:20px">Sin resultados.</td></tr>`; return; }
    t.innerHTML = data.items.map((c,i) => `
      <tr onclick="verDetalle(${i})">
        <td data-l="ID" class="mono">${c.customer_id}</td>
        <td data-l="Nombre"><b>${c.nombre}</b> ${c.apellido}</td>
        <td data-l="Ciudad, País">${c.city}, ${c.country}</td>
        <td data-l="Tienda">Tienda ${c.store_id}</td>
        <td data-l="Estado"><span class="estado-cli ${c.estado}">${c.estado}</span></td>
      </tr>`).join("");
  }

  function verDetalle(i){
    const c = ultimos[i];
    document.getElementById("modalContenido").innerHTML = `
      <h3>${c.nombre} ${c.apellido}</h3>
      <div class="dato"><span>ID</span><span class="mono">${c.customer_id}</span></div>
      <div class="dato"><span>Email</span><span>${c.email}</span></div>
      <div class="dato"><span>Dirección</span><span>${c.address}</span></div>
      <div class="dato"><span>Ciudad</span><span>${c.city}, ${c.country}</span></div>
      <div class="dato"><span>Código postal</span><span class="mono">${c.codigo_postal||'-'}</span></div>
      <div class="dato"><span>Teléfono</span><span class="mono">${c.telefono||'-'}</span></div>
      <div class="dato"><span>Tienda</span><span>Tienda ${c.store_id}</span></div>
      <div class="dato"><span>Estado</span><span class="estado-cli ${c.estado}">${c.estado}</span></div>
      <div class="dato"><span>Registro</span><span class="mono">${c.fecha_registro}</span></div>
      <div class="acciones"><button class="btn-ghost" onclick="cerrarModal()">Cerrar</button></div>`;
    document.getElementById("modalBg").classList.add("show");
  }
  function cerrarModal(){ document.getElementById("modalBg").classList.remove("show"); }

  function anterior(){ if(paginaActual>1) buscar(paginaActual-1); }
  function siguiente(){ buscar(paginaActual+1); }
  function limpiar(){ document.getElementById("fId").value=""; document.getElementById("fNombre").value=""; document.getElementById("fTienda").value=""; document.getElementById("fEstado").value=""; buscar(1); }


</script>
</body>
</html>
